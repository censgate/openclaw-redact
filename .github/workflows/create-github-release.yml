name: Create GitHub Release

# When the version on main changes (e.g. after the Changesets "Version packages" PR merges),
# create a GitHub Release and publish to npm. We run publish in this same workflow (not
# `on: release` in a separate run) because releases created with the default GITHUB_TOKEN
# do not trigger other workflows, and a reusable `workflow_call` to the publish job can
# fail to schedule when npm secrets/permissions are misconfigured.
# See: https://docs.github.com/en/actions/using-workflows/triggering-a-workflow#triggering-a-workflow-from-a-workflow
on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_publish: ${{ steps.create.outputs.should_publish == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version bump
        id: bump
        run: |
          set -euo pipefail
          NEW="$(jq -r .version package.json)"
          if ! git show HEAD~1:package.json >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=no-parent-commit" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          OLD="$(git show HEAD~1:package.json | jq -r .version)"
          if [ "$OLD" = "$NEW" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=no-version-change" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Create release
        id: create
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.bump.outputs.version }}"
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "$TAG" \
            --generate-notes
          echo "should_publish=true" >> "$GITHUB_OUTPUT"

  npm-publish:
    needs: release
    if: needs.release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  clawhub-publish:
    needs: release
    if: needs.release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLAWHUB_DISABLE_TELEMETRY: 1
      HAS_CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN != '' }}
    steps:
      - name: Check ClawHub token
        run: |
          if [ "$HAS_CLAWHUB_TOKEN" != "true" ]; then
            echo "CLAWHUB_TOKEN not configured — skipping ClawHub publish"
          fi

      - uses: actions/checkout@v4
        if: env.HAS_CLAWHUB_TOKEN == 'true'

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        if: env.HAS_CLAWHUB_TOKEN == 'true'
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: env.HAS_CLAWHUB_TOKEN == 'true'
        run: npm ci

      - name: Build
        if: env.HAS_CLAWHUB_TOKEN == 'true'
        run: npm run build

      - name: Install clawhub CLI
        if: env.HAS_CLAWHUB_TOKEN == 'true'
        run: npm install -g clawhub

      - name: Login to ClawHub
        if: env.HAS_CLAWHUB_TOKEN == 'true'
        run: clawhub login --token "$CLAWHUB_TOKEN" --no-browser
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish to ClawHub
        if: env.HAS_CLAWHUB_TOKEN == 'true'
        run: |
          clawhub package publish . --dry-run
          clawhub package publish .
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

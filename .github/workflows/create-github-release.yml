name: Create GitHub Release

# When the version on main changes (e.g. after the Changesets "Version packages" PR merges),
# publish a GitHub Release so `publish.yml` can run `npm publish`.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version bump
        id: bump
        run: |
          set -euo pipefail
          NEW="$(jq -r .version package.json)"
          if ! git show HEAD~1:package.json >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=no-parent-commit" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          OLD="$(git show HEAD~1:package.json | jq -r .version)"
          if [ "$OLD" = "$NEW" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=no-version-change" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
            exit 0
          fi
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "$TAG" \
            --generate-notes

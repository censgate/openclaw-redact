name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # OpenClaw requires Node >=22.14; test current LTS lines (22.x, 24.x).
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Node 22 ships npm 10.x; Node 24 ships npm 11.x. package-lock.json is validated
      # with npm 11.x (`npm ci` differs across majors). Match the npm 11 line everywhere.
      - name: Align npm to 11.11.x
        run: npm install -g npm@11.11.0

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
